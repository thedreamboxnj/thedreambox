<!DOCTYPE html>
<html>
<head>
    <title>Enriched YouTube Playlist Converter (ID + Title)</title>
    <style>
        body { background: #0c0d1f; color: #fff; font-family: monospace; padding: 20px; }
        input, button { background: #1e1f3a; color: #5be8f9; border: 1px solid #d26cf3; padding: 8px; margin: 5px; border-radius: 8px; }
        button { cursor: pointer; }
        button:hover { background: #d26cf3; color: #0c0d1f; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .log { white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
<h2>YouTube Playlist → Enriched JSON (ID + Title)</h2>
<p>Enter a playlist ID (e.g., <code>PLm0x3HD8x6CP3no0izE7AreCY4pcIr5_7</code>) and click "Fetch & Download".</p>
<input type="text" id="playlistId" placeholder="Playlist ID" size="60">
<button id="fetchBtn">Fetch & Download</button>
<button id="batchBtn">Convert All 8 Playlists</button>
<div id="log" class="log"></div>

<script>
const API_KEY = 'AIzaSyAZKamrcHaJPk29dNx0U58gudRPlvxWtJI'; // Replace if needed

async function fetchAllVideoIds(playlistId) {
    let allIds = [];
    let nextPageToken = '';
    do {
        const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&maxResults=50&playlistId=${playlistId}&key=${API_KEY}&pageToken=${nextPageToken}`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.error) throw new Error(`API error: ${data.error.message}`);
        const ids = data.items.map(item => item.contentDetails.videoId);
        allIds.push(...ids);
        nextPageToken = data.nextPageToken || '';
        console.log(`Fetched ${ids.length} IDs, total so far: ${allIds.length}`);
    } while (nextPageToken);
    return allIds;
}

async function fetchTitlesForBatch(videoIds) {
    if (!videoIds.length) return [];
    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoIds.join(',')}&key=${API_KEY}`;
    const response = await fetch(url);
    const data = await response.json();
    if (data.error) throw new Error(`Title fetch error: ${data.error.message}`);
    const titleMap = {};
    if (data.items) {
        data.items.forEach(item => {
            titleMap[item.id] = item.snippet.title;
        });
    }
    return videoIds.map(id => ({
        id: id,
        title: titleMap[id] || `Unknown video (${id.slice(0,8)}...)`
    }));
}

async function convertPlaylist(playlistId, filename) {
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `⏳ Fetching playlist ${playlistId}...<br>`;
    try {
        const allIds = await fetchAllVideoIds(playlistId);
        logDiv.innerHTML += `✅ Fetched ${allIds.length} video IDs.<br>`;

        const enriched = [];
        for (let i = 0; i < allIds.length; i += 50) {
            const chunk = allIds.slice(i, i + 50);
            logDiv.innerHTML += `⏳ Fetching titles for videos ${i+1}–${i+chunk.length}...<br>`;
            const enrichedChunk = await fetchTitlesForBatch(chunk);
            enriched.push(...enrichedChunk);
        }
        logDiv.innerHTML += `✅ Fetched all titles.<br>`;

        // Download JSON
        const blob = new Blob([JSON.stringify(enriched, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        logDiv.innerHTML += `✅ Saved ${enriched.length} videos to ${filename}<br><br>`;
    } catch (err) {
        logDiv.innerHTML += `❌ Error: ${err.message}<br><br>`;
        console.error(err);
    }
}

document.getElementById('fetchBtn').onclick = () => {
    const pid = document.getElementById('playlistId').value.trim();
    if (!pid) return alert('Enter a playlist ID');
    convertPlaylist(pid, `${pid}.json`);
};

document.getElementById('batchBtn').onclick = async () => {
    const playlists = [
        { id: 'PLm0x3HD8x6CP3no0izE7AreCY4pcIr5_7', name: 'music_videos' },
        { id: 'PLHMlZG4cXc4Kg_qSArbWS_8HwOdCnFgsG', name: 'plur' },
        { id: 'PLm0x3HD8x6CMbBbwBL1upNiWF2wu2Boxq', name: 'vaporwave' },
        { id: 'PLm0x3HD8x6CMFcUY1pY3yN1LkPQ8Pyyic', name: 'slutpop' },
        { id: 'PLm0x3HD8x6COvPZ6q89JXNg8d8lkLXLaQ', name: '2010s' },
        { id: 'PLm0x3HD8x6CMnNt_WX6AppP05txGwYmM7', name: '2000s' },
        { id: 'PLm0x3HD8x6CNIrhKVYizgkH28e1tQqy3L', name: '90s' },   // adjust if you have separate
        { id: 'PLm0x3HD8x6CNIrhKVYizgkH28e1tQqy3L', name: '80s' },   // same as 90s? change if needed
        { id: 'PLm0x3HD8x6CN20O4nHZ1GLx1_9z-bNq0t', name: 'discover' }
    ];
    for (const p of playlists) {
        await convertPlaylist(p.id, `${p.name}.json`);
        await new Promise(r => setTimeout(r, 500)); // small delay
    }
    alert('All conversions finished!');
};
</script>
</body>
</html>
