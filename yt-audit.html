<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Playlist Auditor</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0a0a0a; color: #0f0; }
    h1 { color: #0ff; }
    button, input { font-family: monospace; background: #111; color: #0f0; border: 1px solid #0f0; padding: 8px 16px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    progress { width: 100%; margin: 10px 0; }
    .log { background: #111; padding: 10px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
    .report { background: #111; padding: 15px; margin-top: 20px; }
    .dead { color: #f55; }
    .alive { color: #5f5; }
  </style>
</head>
<body>
  <h1>📺 YouTube Playlist Dead‑Link Auditor</h1>
  <div>
    <label>Playlist files (comma‑separated, relative to /data/):</label><br>
    <input type="text" id="playlistFiles" value="slutpop.json" size="60" placeholder="slutpop.json, other.json">
  </div>
  <div style="margin:10px 0;">
    <label>Concurrency (1‑20):</label>
    <input type="number" id="concurrency" value="6" min="1" max="20" style="width:60px;">
    <button id="startBtn">Start Audit</button>
    <button id="clearCacheBtn">Clear Cache</button>
  </div>
  <progress id="progressBar" value="0" max="100"></progress>
  <div id="status">Ready.</div>
  <div class="log" id="log"></div>
  <div id="reportContainer"></div>

  <script>
    (function() {
      const startBtn = document.getElementById('startBtn');
      const clearCacheBtn = document.getElementById('clearCacheBtn');
      const progressBar = document.getElementById('progressBar');
      const statusDiv = document.getElementById('status');
      const logDiv = document.getElementById('log');
      const reportContainer = document.getElementById('reportContainer');
      const playlistFilesInput = document.getElementById('playlistFiles');
      const concurrencyInput = document.getElementById('concurrency');

      // Cache key prefix for localStorage
      const CACHE_PREFIX = 'yt_audit_';

      // Utility: log message to screen
      function log(msg) {
        logDiv.textContent += msg + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      // Fetch a JSON file from /data/
      async function fetchPlaylist(filename) {
        const res = await fetch(`data/${filename}`);
        if (!res.ok) throw new Error(`Failed to load ${filename}: ${res.status}`);
        return res.json();
      }

      // Check single video ID via oEmbed
      async function checkVideoId(videoId) {
        const url = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`;
        try {
          const res = await fetch(url);
          return { videoId, alive: res.ok };
        } catch (err) {
          // Network error – treat as dead/unavailable
          return { videoId, alive: false, error: true };
        }
      }

      // Main audit
      async function runAudit(playlistFiles, concurrency) {
        // Reset UI
        logDiv.textContent = '';
        reportContainer.innerHTML = '';
        progressBar.value = 0;
        statusDiv.textContent = 'Loading playlists...';
        log('🔍 Starting audit...');

        // Step 1: Load all playlists and collect video IDs
        const playlistsData = [];
        const allVideoIds = new Set(); // deduplicate automatically
        const playlistVideoMap = new Map(); // playlistName -> videoIds array

        for (const file of playlistFiles) {
          try {
            log(`📂 Loading ${file}...`);
            const data = await fetchPlaylist(file.trim());
            playlistsData.push(data);
            const ids = data.videoIds;
            playlistVideoMap.set(data.playlistName, ids);
            ids.forEach(id => allVideoIds.add(id));
            log(`   ✔ ${data.playlistName}: ${ids.length} videos`);
          } catch (err) {
            log(`❌ ${err.message}`);
          }
        }

        const totalVideos = allVideoIds.size;
        if (totalVideos === 0) {
          statusDiv.textContent = 'No videos found.';
          return;
        }

        statusDiv.textContent = `Checking ${totalVideos} unique videos...`;
        log(`🎬 Total unique videos to check: ${totalVideos}`);

        // Step 2: Check videos with concurrency limit
        const videoIdsArray = Array.from(allVideoIds);
        const results = new Map(); // videoId -> { alive, error? }
        let checked = 0;
        let deadCount = 0;

        // Use cache if available
        const cachedResults = loadCache();
        const needCheck = [];

        for (const id of videoIdsArray) {
          if (cachedResults.has(id)) {
            results.set(id, cachedResults.get(id));
            if (!cachedResults.get(id).alive) deadCount++;
            checked++;
          } else {
            needCheck.push(id);
          }
        }

        if (needCheck.length > 0) {
          log(`⚡ Using cached results for ${checked} videos. Checking ${needCheck.length} fresh...`);
          progressBar.max = totalVideos;
          progressBar.value = checked;
          statusDiv.textContent = `Checked ${checked}/${totalVideos} (using cache)...`;

          // Concurrency controller
          const queue = [...needCheck];
          const activeRequests = new Set();

          const processNext = async () => {
            if (queue.length === 0) return;
            const id = queue.shift();
            const promise = checkVideoId(id).then(result => {
              results.set(id, result);
              if (!result.alive) deadCount++;
              checked++;
              progressBar.value = checked;
              statusDiv.textContent = `Checked ${checked}/${totalVideos}...`;
              // Cache this result
              cacheResult(id, result);
              activeRequests.delete(promise);
              // Process next
              return processNext();
            });
            activeRequests.add(promise);
            if (activeRequests.size < concurrency && queue.length > 0) {
              // Fill up to concurrency
              const toAdd = concurrency - activeRequests.size;
              for (let i = 0; i < toAdd && queue.length > 0; i++) {
                processNext();
              }
            }
          };

          // Start initial batch
          for (let i = 0; i < Math.min(concurrency, queue.length); i++) {
            processNext();
          }

          // Wait until all requests finish
          while (activeRequests.size > 0) {
            await Promise.race(activeRequests);
          }
        } else {
          log('📦 All results loaded from cache!');
          progressBar.max = totalVideos;
          progressBar.value = totalVideos;
          statusDiv.textContent = `Audit complete (all cached).`;
        }

        // Step 3: Generate report
        const unavailablePerPlaylist = {};
        for (const [playlistName, ids] of playlistVideoMap) {
          const deadIds = ids.filter(id => {
            const res = results.get(id);
            return res && !res.alive;
          });
          unavailablePerPlaylist[playlistName] = deadIds;
        }

        // Build report HTML
        let reportHtml = `<h2>📋 Audit Report</h2>`;
        reportHtml += `<p>Total unique videos checked: <strong>${totalVideos}</strong> | Dead: <strong class="dead">${deadCount}</strong> | Alive: <strong class="alive">${totalVideos - deadCount}</strong></p>`;

        for (const playlistData of playlistsData) {
          const name = playlistData.playlistName;
          const dead = unavailablePerPlaylist[name] || [];
          const total = playlistData.videoIds.length;
          reportHtml += `<h3>${name} (${dead.length} dead / ${total} total)</h3>`;
          if (dead.length > 0) {
            reportHtml += `<ul>`;
            dead.forEach(id => {
              reportHtml += `<li class="dead">${id}</li>`;
            });
            reportHtml += `</ul>`;
          } else {
            reportHtml += `<p class="alive">✅ All videos alive!</p>`;
          }
        }

        reportContainer.innerHTML = reportHtml;
        statusDiv.textContent = 'Audit complete.';
        log('✅ Finished.');
      }

      // LocalStorage caching
      function loadCache() {
        const cache = {};
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key.startsWith(CACHE_PREFIX)) {
            const videoId = key.substring(CACHE_PREFIX.length);
            try {
              cache[videoId] = JSON.parse(localStorage.getItem(key));
            } catch (e) {}
          }
        }
        return new Map(Object.entries(cache));
      }

      function cacheResult(videoId, result) {
        localStorage.setItem(CACHE_PREFIX + videoId, JSON.stringify(result));
      }

      function clearCache() {
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key.startsWith(CACHE_PREFIX)) keysToRemove.push(key);
        }
        keysToRemove.forEach(k => localStorage.removeItem(k));
        log('🗑️ Cache cleared.');
        statusDiv.textContent = 'Cache cleared.';
      }

      // Event listeners
      startBtn.addEventListener('click', () => {
        const files = playlistFilesInput.value.split(',').filter(f => f.trim() !== '');
        const concurrency = parseInt(concurrencyInput.value, 10) || 6;
        if (files.length === 0) {
          alert('Enter at least one playlist file.');
          return;
        }
        startBtn.disabled = true;
        runAudit(files, concurrency).finally(() => {
          startBtn.disabled = false;
        });
      });

      clearCacheBtn.addEventListener('click', clearCache);
    })();
  </script>
</body>
</html>
